<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bebo_store</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:black;
}

/* الخلفية */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('bg.jpg') no-repeat center;
background-size:contain;
z-index:-2;
}

/* تغطية سوداء */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

h1{
color:#FFD700;
}

.section{
margin:10px;
padding:15px;
background:rgba(0,0,0,0.6);
border-radius:10px;
}

.price{
color:#00ffcc;
font-size:18px;
}

a{
color:white;
display:block;
margin:20px;
}

</style>
</head>

<body>

<h1>عروض العيد السنوية</h1>

<p>أقوى عروض الشحن وصلت</p>
<p>ادفع أقل وخذ الضعف</p>

<div class="section">
<p>500,000 + 500,000</p>
<p class="price">60,000</p>
</div>

<div class="section">
<p>1,000,000 + 1,000,000</p>
<p class="price">130,000</p>
</div>

<div class="section">
<p>2,000,000 + 2,000,000</p>
<p class="price">260,000</p>
</div>

<div class="section">
<p>3,000,000 + 3,000,000</p>
<p class="price">380,000</p>
</div>

<div class="section">
<p>5,000,000 + 5,000,000</p>
<p class="price">630,000</p>
</div>

<a href="contact.html">انتقل لصفحة التواصل</a>

</body>
</html>
